# ============================================================
# Nav2 mapless configuration
#
# ROS distribution: Jazzy
# Robot type: Differential drive
#
# Required topics:
#   /scan       sensor_msgs/msg/LaserScan
#   /odom       nav_msgs/msg/Odometry
#
# Required TF:
#   odom -> base_link
#   base_link -> laser_frame
#
# Output:
#   /cmd_vel    geometry_msgs/msg/Twist
#
# There is no:
#   map frame
#   map_server
#   AMCL
#   SLAM
# ============================================================


# ============================================================
# Behavior Tree Navigator
# ============================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0

    navigators:
      - navigate_to_pose
      - navigate_through_poses

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code


# ============================================================
# Controller Server
# ============================================================

controller_server:
  ros__parameters:
    use_sim_time: false

    controller_frequency: 10.0
    costmap_update_timeout: 0.30

    odom_topic: /odom

    # Jazzy normally uses geometry_msgs/msg/Twist.
    enable_stamped_cmd_vel: false

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3

    progress_checker_plugins:
      - progress_checker

    goal_checker_plugins:
      - goal_checker

    controller_plugins:
      - FollowPath

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.20
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      # ------------------------------------------------------
      # Robot velocity limits
      # Adjust these for your robot.
      # ------------------------------------------------------

      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.40
      max_vel_y: 0.0
      max_vel_theta: 1.0

      min_speed_xy: 0.0
      max_speed_xy: 0.40
      min_speed_theta: 0.0

      # ------------------------------------------------------
      # Acceleration limits
      # ------------------------------------------------------

      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.0

      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.0

      # ------------------------------------------------------
      # Trajectory sampling
      # ------------------------------------------------------

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.7

      linear_granularity: 0.05
      angular_granularity: 0.025

      transform_tolerance: 0.2

      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.05

      short_circuit_trajectory_evaluation: true
      stateful: true

      # ------------------------------------------------------
      # DWB trajectory critics
      # ------------------------------------------------------

      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      BaseObstacle.scale: 0.02

      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1

      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1

      PathDist.scale: 32.0
      GoalDist.scale: 24.0

      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


# ============================================================
# Local Costmap
# ============================================================

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 10.0
      publish_frequency: 5.0

      transform_tolerance: 0.3

      rolling_window: true

      width: 8
      height: 7
      resolution: 0.02

      # Replace this with the actual robot radius.
      # robot_radius: 0.18

      # For a rectangular robot, remove robot_radius and use:
      
      footprint:
        "[[-0.34, -0.19],
        [-0.34,  0.19],
        [ 0.09,  0.19], 
        [ 0.09, -0.19]]"

      footprint_padding: 0.02

      track_unknown_space: false

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"

          marking: true
          clearing: true

          obstacle_min_range: 0.0
          obstacle_max_range: 4.5

          raytrace_min_range: 0.0
          raytrace_max_range: 3.0

          max_obstacle_height: 3.0
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true

        inflation_radius: 0.50
        cost_scaling_factor: 3.0

      always_send_full_costmap: true


# ============================================================
# Global Costmap
#
# This is also a rolling costmap. It does not use a static map.
# ============================================================

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 5.0
      publish_frequency: 2.0

      transform_tolerance: 0.3

      rolling_window: true

      # The robot can plan only inside this rolling area.
      width: 15
      height: 15
      resolution: 0.05

      # robot_radius: 0.25

      footprint:
        "[[-0.34, -0.19],
        [-0.34,  0.19],
        [ 0.09,  0.19], 
        [ 0.09, -0.19]]"
      
      footprint_padding: 0.02

      track_unknown_space: false

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"

          marking: true
          clearing: true

          obstacle_min_range: 0.0
          obstacle_max_range: 2.5

          raytrace_min_range: 0.0
          raytrace_max_range: 3.0

          max_obstacle_height: 2.0
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true

        inflation_radius: 0.50
        cost_scaling_factor: 3.0

      always_send_full_costmap: true


# ============================================================
# Planner Server
# ============================================================

planner_server:
  ros__parameters:
    use_sim_time: false

    expected_planner_frequency: 0.1
    costmap_update_timeout: 1.0

    planner_plugins:
      - GridBased

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

      tolerance: 0.10
      use_astar: false

      # No unknown space should exist because the rolling costmap
      # is initialized as free and filled by sensor observations.
      allow_unknown: false


# ============================================================
# Smoother Server
# ============================================================

smoother_server:
  ros__parameters:
    use_sim_time: false

    smoother_plugins:
      - simple_smoother

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"

      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


# ============================================================
# Behavior Server
# ============================================================

behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw

    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - wait

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    local_frame: odom
    global_frame: odom
    robot_base_frame: base_link

    transform_tolerance: 0.2

    simulate_ahead_time: 2.0

    max_rotational_vel: 1.0
    min_rotational_vel: 0.20
    rotational_acc_lim: 2.0

    enable_stamped_cmd_vel: false


# ============================================================
# Waypoint Follower
# ============================================================

waypoint_follower:
  ros__parameters:
    use_sim_time: false

    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0

    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0


# ============================================================
# Velocity Smoother
#
# The standard navigation_launch.py remaps the Nav2 controller
# output through this node before publishing the final /cmd_vel.
# ============================================================

velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0

    scale_velocities: false
    feedback: "OPEN_LOOP"

    # [linear x, linear y, angular z]
    max_velocity: [0.40, 0.0, 1.0]
    min_velocity: [-0.10, 0.0, -1.0]

    max_accel: [1.0, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]

    odom_topic: /odom
    odom_duration: 0.1

    deadband_velocity: [0.0, 0.0, 0.0]

    velocity_timeout: 1.0

    enable_stamped_cmd_vel: false


collision_monitor:
  ros__parameters:
    use_sim_time: false

    base_frame_id: base_link
    odom_frame_id: odom

    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel

    state_topic: collision_monitor_state

    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true

    stop_pub_timeout: 2.0

    polygons:
      - StopZone
      - SlowZone

    StopZone:
      type: polygon
      points: "[[-0.39, -0.24], [-0.39, 0.24], [0.14, 0.24], [0.14, -0.24]]"
      action_type: stop
      min_points: 3
      visualize: true
      polygon_pub_topic: stop_zone
      enabled: true

    SlowZone:
      type: polygon
      points: "[[-0.49, -0.34], [-0.49, 0.34], [0.24, 0.34], [0.24, -0.34]]"
      action_type: slowdown
      min_points: 3
      slowdown_ratio: 0.5
      visualize: true
      polygon_pub_topic: slow_zone
      enabled: true

    observation_sources:
      - scan

    scan:
      type: scan
      topic: /scan
      enabled: true


# ============================================================
# Lifecycle Manager
#
# navigation_launch.py normally supplies the node list itself.
# These values are safe if the launch file reads this namespace.
# ============================================================

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true