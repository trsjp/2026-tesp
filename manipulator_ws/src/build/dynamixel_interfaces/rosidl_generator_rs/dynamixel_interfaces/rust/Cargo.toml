[package]
name = "dynamixel_interfaces"
version = "1.0.1"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
service_msgs = "*"
std_msgs = "*"
geometry_msgs = "*"
builtin_interfaces = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'service_msgs/serde', 'std_msgs/serde', 'geometry_msgs/serde', 'builtin_interfaces/serde']

[package.metadata.ros-env]
include = true
